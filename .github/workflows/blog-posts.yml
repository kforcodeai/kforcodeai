name: Sync latest blog posts to README

on:
  schedule:
    - cron: '0 6 * * *' # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest posts from blog RSS
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: 'https://kforcodeai.github.io/rss.xml'
          max_post_count: 5
          commit_message: 'chore: sync latest blog posts'
